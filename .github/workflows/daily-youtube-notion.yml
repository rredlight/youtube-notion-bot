name: Claude YouTube → Notion 일일 자동화

on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch:

jobs:
  collect-and-upload:
    name: 신규 영상 수집 & 노션 업로드
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📦 저장소 체크아웃
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 🚀 자동화 실행
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY:     ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PARENT_PAGE: ${{ secrets.NOTION_PARENT_PAGE }}
        run: node automation.js

      - name: 📋 실행 결과 요약
        if: always()
        run: echo "완료 $(date)"
